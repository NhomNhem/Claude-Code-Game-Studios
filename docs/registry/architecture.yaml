# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: service_registration_pattern
    status: active
    pattern: direct_call
    producer: TinyRiftScope
    consumers:
      - All 35+ custom systems across Foundation/Core/Feature/Presentation
    adr: docs/architecture/adr-001-vcontainer-di-architecture.md
    contract_detail: "All custom systems register as interface singletons in TinyRiftScope. Consumers depend on interfaces, not concrete types. TinyRiftScope is child of BackendLifetimeScope (template scope)."
    referenced_by:
      - docs/architecture/adr-001-vcontainer-di-architecture.md
    added: 2026-06-01

  - contract: event_bus_communication
    status: active
    pattern: event_bus
    producer: "Any system (publishes via IEventBus)"
    consumers:
      - "Any system (subscribes via ISubscriber)"
    adr: docs/architecture/adr-002-event-bus-contract.md
    contract_detail: "All cross-system communication goes through typed Event Bus events (readonly record struct). Producers publish via IEventBus, consumers subscribe via ISubscriber. Never direct system references."
    referenced_by:
      - docs/architecture/adr-002-event-bus-contract.md
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - contract: persistence_sync_architecture
    status: active
    pattern: shared_resource
    producer: IPersistStateService
    consumers:
      - IProfileSyncService (reads PersistentSaveData, maps to sync payload)
      - IBackendService / WebSocketSQL (receives synced payload from ProfileSyncService)
    adr: docs/architecture/adr-006-save-profile-serialization.md
    contract_detail: "Three-layer architecture: IPersistStateService owns disk I/O (Foundation), IProfileSyncService owns sync orchestration (Core), IBackendService owns transport. Each layer knows nothing about the other's internal concerns."
    referenced_by:
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - contract: enemy_ai_service_registration
    status: active
    pattern: direct_call
    producer: TinyRiftScope
    consumers:
      - EnemyChaseAI (per-enemy MonoBehaviour)
      - Wave Spawning (pool activation/deactivation)
    adr: docs/architecture/adr-007-enemy-ai-state-machine-architecture.md
    contract_detail: "IEnemyAIService registered as singleton in TinyRiftScope. Enemies register/unregister via service methods (RegisterEnemy/UnregisterEnemy), not static lists. Service provides central enemy registry for Wave Spawning coordination."
    referenced_by:
      - docs/architecture/adr-007-enemy-ai-state-machine-architecture.md
    added: 2026-06-05

