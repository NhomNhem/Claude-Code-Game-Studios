# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: orbit_combat
    status: active
    budget_ms: 0.05
    adr: docs/architecture/adr-008-orbit-combat-targeting.md
    notes: "OrbitCombatService.LateUpdate() — ring angle advancement + projectile positioning. O(n×m) with n≤5 rings, m≤8 projectiles. < 0.05ms worst case."
    referenced_by:
      - docs/architecture/adr-008-orbit-combat-targeting.md
    added: 2026-06-05


# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: dependency_injection
    status: active
    api: VContainer (bundled in Assets/BulletHellTemplate/ThirdPartyResources/Tools/VContainer/)
    not: Zenject, custom Service Locator, Singleton pattern
    adr: docs/architecture/adr-001-vcontainer-di-architecture.md
    reason: "VContainer is bundled in the template. Extending it with a child scope (TinyRiftScope) leverages existing investment without adding another DI framework."
    referenced_by:
      - docs/architecture/adr-001-vcontainer-di-architecture.md
    added: 2026-06-01

  - purpose: async_startup_entry_point
    status: active
    api: VContainer IAsyncStartable (RegisterEntryPoint)
    not: IStartable (returns void, cannot await async init), MonoBehaviour.Start(), manual call from scene controller
    adr: docs/architecture/adr-001-vcontainer-di-architecture.md
    reason: "IAsyncStartable returns UnityEngine.Awaitable on Unity 6000.x, enabling non-blocking async startup without coupling to scene lifecycle."
    referenced_by:
      - docs/architecture/adr-001-vcontainer-di-architecture.md
    added: 2026-06-01

  - purpose: event_type_format
    status: active
    api: "readonly record struct (C# 9, .NET Standard 2.1)"
    not: class (heap allocation per publish), object-based dispatch (untyped, no compile-time safety)
    adr: docs/architecture/adr-002-event-bus-contract.md
    reason: "Zero GC allocation per publish under IL2CPP. Struct passed by in (readonly reference). Compiler-enforced immutability."
    referenced_by:
      - docs/architecture/adr-002-event-bus-contract.md
    added: 2026-06-01

  - purpose: event_bus_interface_split
    status: active
    api: "IEventBus (Publish + Subscribe) + ISubscriber (Subscribe only)"
    not: single IEventBus for all consumers (risk of accidental Publish), separate IReadOnlyEventBus (equivalent)
    adr: docs/architecture/adr-002-event-bus-contract.md
    reason: "Split interface prevents consumer-only systems (HUD, Audio, VFX) from accidentally publishing events. VContainer registers same instance under two interfaces — zero cost."
    referenced_by:
      - docs/architecture/adr-002-event-bus-contract.md
    added: 2026-06-01

  - purpose: input_wrapper_pattern
    status: active
    api: "InputRouter wrapping InputActionAsset (manual action wiring)"
    not: "generated C# class from .inputactions (tight coupling to code gen), PlayerInput component (heavy UnityEvents, no interface), legacy Input class (deprecated)"
    adr: docs/architecture/adr-003-input-system-wrapper.md
    reason: "Manual wrapper over InputActionAsset provides IInputRouter interface for DI/testability, GState-driven map switching via Event Bus, and device abstraction without coupling to Unity code generation."
    referenced_by:
      - docs/architecture/adr-003-input-system-wrapper.md
    added: 2026-06-01

  - purpose: gstate_input_routing
    status: active
    api: "Event Bus GameStateChangedEvent → InputRouter.SetActionMap()"
    not: per-system GState checks, polling GState in Update, per-map Enable/Disable scattered across systems
    adr: docs/architecture/adr-003-input-system-wrapper.md
    reason: "Centralized map switching guarantees input fidelity without per-system GState checks. One subscriber, one switch per transition."
    referenced_by:
      - docs/architecture/adr-003-input-system-wrapper.md
    added: 2026-06-01

  - purpose: persistence_serialization
    status: active
    api: "Newtonsoft.Json (com.unity.nuget.newtonsoft-json, bundled)"
    not: "BinaryFormatter (removed in .NET, unsafe), JsonUtility (no DateTime, no MissingMemberHandling, no JObject migration), PlayerPrefs (no conflict resolution, no schema versioning)"
    adr: docs/architecture/adr-006-save-profile-serialization.md
    reason: "Template already bundles Newtonsoft.Json. Enables datetime handling, forward-compatible MissingMemberHandling.Ignore, JObject-based migration, and human-readable debugging."
    referenced_by:
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - purpose: persistence_write_strategy
    status: active
    api: "Atomic temp→rename + dirty-flag+debounce coalescing"
    not: "Direct file write (partial-write corruption on crash), synchronous write per call (I/O thrashing from rapid sequential persists)"
    adr: docs/architecture/adr-006-save-profile-serialization.md
    reason: "Temp→rename prevents corruption on crash. Dirty-flag+debounce coalesces N rapid calls into 1 disk write (60 calls/frame = 1 write). Settings writes get 500ms debounce to prevent slider-drag thrashing."
    referenced_by:
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - purpose: persistence_economy_model
    status: active
    api: "Server-authoritative balance with per-device earnings delta reporting"
    not: "Absolute balance push from client (no fraud prevention, multi-device race on newest-wins)"
    adr: docs/architecture/adr-006-save-profile-serialization.md
    reason: "Balance = sum(earnedAcrossAllDevices) - sum(spent). Clients report deltas only. Server tracks totalEarnedPerDevice. Minimum 15-minute sync interval. 50K gold/day rolling cap across all devices."
    referenced_by:
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - purpose: persistence_conflict_resolution
    status: active
    api: "Field-type-specific merge strategies"
    not: "One-size-fits-all newest-wins (removes progression unlocks, loses cumulative counters)"
    adr: docs/architecture/adr-006-save-profile-serialization.md
    reason: "Scalars: newest-wins timestamp + device-ID tiebreaker. Lists: union-merge (monotonic append-only). Cumulative: additive with per-device last-seen baseline. ZoneCompletionEntry: per-field (logical OR, max-wins, newest-wins). Each type gets the merge strategy that preserves correctness."
    referenced_by:
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - purpose: migration_aot_safety
    status: active
    api: "Typed JsonConvert.DeserializeObject<T> for migration functions"
    not: "JObject.ToObject<T>() or Populate() (uses Reflection.Emit at runtime — crashes under IL2CPP)"
    adr: docs/architecture/adr-006-save-profile-serialization.md
    reason: "IL2CPP AOT compilation cannot generate deserializers at runtime. Typed DeserializeObject<T> uses statically-compiled paths. All serialized fields use [JsonProperty] for preservation. link.xml preserves schema + Newtonsoft.Json internals."
    referenced_by:
      - docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - purpose: orbit_projectile_positioning
    status: active
    api: "LateUpdate + direct transform.position (kinematic, no Rigidbody)"
    not: "Rigidbody.MovePosition() (would require Rigidbody on each pooled projectile, adds physics overhead), FixedUpdate positioning (would decouple orbit visual from player visual, causing visible lag)"
    adr: docs/architecture/adr-008-orbit-combat-targeting.md
    reason: "Orbit projectiles are purely kinematic — they don't use physics for movement. Direct transform.position in LateUpdate ensures they follow player position each frame after player movement (Update) completes. No Rigidbody overhead per pooled projectile. Physics trigger colliders work independently — trigger events fire regardless of how position is set."
    referenced_by:
      - docs/architecture/adr-008-orbit-combat-targeting.md
    added: 2026-06-05

