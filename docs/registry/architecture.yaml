# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: service_locator
    status: active
    description: "Systems must not use static Service Locator for cross-system resolution. Use VContainer constructor injection instead."
    why: "Service Locator creates hidden dependencies not visible at construction time, making systems untestable in isolation and hiding dependency chains."
    adr: docs/architecture/adr-001-vcontainer-di-architecture.md
    added: 2026-06-01

  - pattern: singleton_t_findobject_type
    status: active
    description: "Systems must not use Singleton<T> or FindObjectOfType for cross-system service resolution. Use VContainer interface injection."
    why: "Direct singleton access and scene searches create tight coupling and bypass DI, making systems untestable in isolation."
    adr: docs/architecture/adr-001-vcontainer-di-architecture.md
    added: 2026-06-01

  - pattern: template_code_modification
    status: active
    description: "Never modify Assets/BulletHellTemplate/ code. Use wrapping, bridge patterns, or child scopes in Assets/_TinyRift/."
    why: "Template modifications break the upgrade path and create merge conflicts when template updates are released."
    adr: docs/architecture/adr-001-vcontainer-di-architecture.md
    added: 2026-06-01

  - pattern: closure_lambdas_in_subscribe
    status: active
    description: "Never use closure lambdas in Event Bus Subscribe calls: _bus.Subscribe<Event>((e) => Handle(e)). Use method group: _bus.Subscribe<Event>(Handle)."
    why: "Closure lambdas allocate a new delegate + closure object per Subscribe call. In hot paths (Subscribe in Start, which is once per system) this is negligible, but the pattern prevents accidental GC allocation if Subscribe is called in Update."
    adr: docs/architecture/adr-002-event-bus-contract.md
    added: 2026-06-01

  - pattern: legacy_input_calls
    status: active
    description: "Never use Input.GetKey, Input.GetMouseButton, Input.GetAxis, Input.mousePosition, or any UnityEngine.Input class in Assets/_TinyRift/. Use IInputRouter or direct Input System API."
    why: "Input class is deprecated in Unity 6. Does not support gamepad, touch, or rebinding. Any usage would create untestable code and inconsistent input behavior across devices."
    adr: docs/architecture/adr-003-input-system-wrapper.md
    added: 2026-06-01

  - pattern: generated_input_class_as_primary
    status: active
    description: "Never use a generated C# InputActionAsset class as the primary input access pattern. All input must go through IInputRouter interface."
    why: "Generated classes tie consumers to Unity's input code generation pipeline. IInputRouter provides testability, device abstraction, and GState routing that generated classes cannot provide."
    adr: docs/architecture/adr-003-input-system-wrapper.md
    added: 2026-06-01

  - pattern: jobject_toobject_in_migration
    status: active
    description: "Never use JObject.ToObject<T>() or Populate() in migration functions. Use typed JsonConvert.DeserializeObject<T>() with [JsonProperty] annotations."
    why: "JObject.ToObject<T>() and Populate() use runtime Reflection.Emit to generate deserializers. Under IL2CPP/AOT, this crashes with ExecutionEngineException because the JIT is unavailable. Typed DeserializeObject<T>() uses statically-compiled AOT-safe paths."
    adr: docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - pattern: absolute_balance_push
    status: active
    description: "Never push absolute gold or premiumCurrency values to the server. Report earnings deltas (earnedThisSession) only."
    why: "Absolute balance push from client enables single-device fraud (client corrupts or modifies the value) and creates multi-device merge races (newest-wins overwrites earnings from other devices). The delta-reporting model with per-device totalEarned tracking is server-authoritative and supports offline play."
    adr: docs/architecture/adr-006-save-profile-serialization.md
    added: 2026-06-01

  - pattern: enemy_static_registration
    status: active
    description: "Systems must not use static lists for enemy management. Use IEnemyAIService.RegisterEnemy/UnregisterEnemy instead."
    why: "Static lists create hidden dependencies, break testability, and bypass DI. IEnemyAIService provides central enemy registry for Wave Spawning coordination while respecting VContainer DI patterns."
    adr: docs/architecture/adr-007-enemy-ai-state-machine-architecture.md
    added: 2026-06-05

